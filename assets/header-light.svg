<svg xmlns="http://www.w3.org/2000/svg" width="860" height="240" viewBox="0 0 860 240" role="img" aria-label="HILFING — full-stack developer, co-founder and sole developer of AutoMint. 4+ years, 150+ projects, 120+ clients.">
  <style>
    .mono { font-family: 'JetBrains Mono', 'Fira Code', 'SF Mono', Menlo, Consolas, 'Liberation Mono', monospace; }
    .l-in { opacity: 1; animation: lineIn 0.5s ease-out both; }
    .d1 { animation-delay: 0.35s; }
    .d2 { animation-delay: 1.75s; }
    .d3 { animation-delay: 2.15s; }
    @keyframes lineIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    /* typing wipe: cover shrinks left-to-right in character steps */
    .wipe { transform: scaleX(0); transform-origin: 306px 0; animation: wipe 0.85s steps(7, end) 0.8s both; }
    @keyframes wipe {
      from { transform: scaleX(1); }
      to   { transform: scaleX(0); }
    }
    .blink { animation: blink 1.1s steps(2, start) infinite; }
    @keyframes blink { to { visibility: hidden; } }
    .pulse { animation: pulse 2.4s ease-in-out infinite; }
    @keyframes pulse { 0%, 100% { opacity: 0.9; } 50% { opacity: 0.25; } }
    @media (prefers-reduced-motion: reduce) {
      .l-in, .wipe, .blink, .pulse { animation: none !important; }
    }
  </style>

  <defs>
    <clipPath id="frame">
      <rect x="1" y="1" width="858" height="238" rx="12" />
    </clipPath>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2" result="b" />
      <feMerge>
        <feMergeNode in="b" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <pattern id="grid" width="26" height="26" patternUnits="userSpaceOnUse">
      <path d="M26 0H0V26" stroke="#067a47" stroke-opacity="0.07" fill="none" />
    </pattern>
  </defs>

  <!-- terminal frame -->
  <rect x="1" y="1" width="858" height="238" rx="12" fill="#f7faf8" stroke="#067a47" stroke-opacity="0.5" />
  <g clip-path="url(#frame)">
    <rect x="1" y="1" width="858" height="238" fill="url(#grid)" />

    <!-- chrome bar -->
    <rect x="1" y="1" width="858" height="36" fill="#e6f0ea" />
    <line x1="1" y1="37" x2="859" y2="37" stroke="#067a47" stroke-opacity="0.25" />
    <circle cx="26" cy="19" r="5.5" fill="#ff5f56" opacity="0.85" />
    <circle cx="46" cy="19" r="5.5" fill="#ffbd2e" opacity="0.85" />
    <circle cx="66" cy="19" r="5.5" fill="#27c93f" opacity="0.85" />
    <text x="430" y="23.5" text-anchor="middle" class="mono" font-size="11" fill="#0a6e44" fill-opacity="0.8" letter-spacing="2">hilfing@dev:~$ ./init_identity.sh</text>

    <!-- scanline sweep -->
    <rect x="2" y="-8" width="856" height="4" fill="#067a47" opacity="0.05">
      <animate attributeName="y" values="-8;244" dur="7s" repeatCount="indefinite" />
    </rect>

    <!-- radar (decorative) -->
    <g transform="translate(775, 152)">
      <circle r="50" stroke="#067a47" stroke-opacity="0.2" fill="none" />
      <circle r="34" stroke="#067a47" stroke-opacity="0.25" fill="none" />
      <circle r="18" stroke="#067a47" stroke-opacity="0.3" fill="none" />
      <line x1="-50" y1="0" x2="50" y2="0" stroke="#067a47" stroke-opacity="0.15" />
      <line x1="0" y1="-50" x2="0" y2="50" stroke="#067a47" stroke-opacity="0.15" />
      <g>
        <line x1="0" y1="0" x2="0" y2="-50" stroke="#067a47" stroke-opacity="0.6" stroke-width="1.5" />
        <circle cx="0" cy="-50" r="2.5" fill="#0891b2" />
        <animateTransform attributeName="transform" type="rotate" from="0 0 0" to="360 0 0" dur="5s" repeatCount="indefinite" />
      </g>
      <circle cx="22" cy="-14" r="2.5" fill="#067a47" class="pulse" />
    </g>

    <!-- line 1: prompt -->
    <text x="28" y="72" class="mono l-in d1" font-size="14" letter-spacing="1">
      <tspan fill="#0891b2">$</tspan>
      <tspan fill="#5b6b76" dx="6">whoami</tspan>
    </text>

    <!-- identity -->
    <text x="28" y="124" class="mono" font-size="46" font-weight="700" letter-spacing="10" fill="#047857" filter="url(#glow)">HILFING</text>
    <rect x="24" y="84" width="282" height="50" fill="#f7faf8" class="wipe" />
    <rect x="318" y="90" width="18" height="38" fill="#047857" class="blink" />

    <!-- role -->
    <text x="28" y="156" class="mono l-in d2" font-size="13" letter-spacing="3" fill="#0e7490" fill-opacity="1">FULL-STACK DEVELOPER // CO-FOUNDER &amp; SOLE DEV @ AUTOMINT</text>

    <!-- uptime -->
    <text x="28" y="192" class="mono l-in d3" font-size="13" letter-spacing="1">
      <tspan fill="#0891b2">$</tspan>
      <tspan fill="#5b6b76" dx="6">uptime</tspan>
      <tspan fill="#94a3ab" dx="10">-&gt;</tspan>
      <tspan fill="#047857" dx="10">4+</tspan>
      <tspan fill="#55636e" dx="4">YEARS</tspan>
      <tspan fill="#94a3ab" dx="8">::</tspan>
      <tspan fill="#047857" dx="8">150+</tspan>
      <tspan fill="#55636e" dx="4">PROJECTS</tspan>
      <tspan fill="#94a3ab" dx="8">::</tspan>
      <tspan fill="#047857" dx="8">120+</tspan>
      <tspan fill="#55636e" dx="4">CLIENTS</tspan>
    </text>

    <!-- status -->
    <circle cx="576" cy="222" r="3" fill="#067a47" class="pulse" />
    <text x="838" y="226" text-anchor="end" class="mono" font-size="9" letter-spacing="2" fill="#0a6e44" fill-opacity="0.65">SYS_STATUS: ONLINE // HILFING.DEV</text>
  </g>
</svg>
